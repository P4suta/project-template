# lefthook (https://lefthook.dev/) — Rust-aware hook policy.
# Supersedes the `lefthook` layer's generic config: rust-workspace
# applies after `lefthook` so this file wins on overwrite.
#
# Install:   just hooks
# Uninstall: just hooks-uninstall

pre-commit:
  parallel: true
  skip:
    - rebase
    - merge
  commands:
    fmt:
      glob: "*.rs"
      run: just fmt
      stage_fixed: true
    clippy:
      glob: "*.{rs,toml}"
      run: just clippy
    typos:
      run: just typos
    actionlint:
      glob: ".github/workflows/*.{yml,yaml}"
      run: just actionlint
    yamllint:
      glob: "**/*.{yml,yaml}"
      run: just yamllint
    markdownlint:
      glob: "**/*.md"
      run: just markdownlint
    strict-code:
      run: just strict-code

commit-msg:
  commands:
    conventional:
      run: committed --commit-file {1}

pre-push:
  parallel: true
  skip:
    - rebase
  commands:
    test:
      run: just test
    audit:
      run: just audit
    # 依存マニフェストを変更した push のとき、Dependabot のスキャンを待たず
    # ローカルで古さを通知する。非ブロッキング(`|| true`)— push は止めない。
    # gh 未認証だと renovate-local が exit 1 するが、その旨は stderr に出る。
    # 通知だけで十分なら manual 実行(`just renovate-local`)に切り替えてよい。
    deps-freshness:
      glob: "{Cargo.toml,Cargo.lock,**/Cargo.toml,.config/mise/config.toml,Dockerfile,.github/workflows/*}"
      run: just renovate-local || true
