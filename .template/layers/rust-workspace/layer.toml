name        = "rust-workspace"
description = "Cargo workspace scaffolding with a strict lint policy (clippy pedantic + nursery + cargo + curated restriction picks), a tight clippy.toml, stable-only rustfmt, cargo-deny, mise-pinned cargo plugins, and a host/mise Justfile (plain cargo, no container required) with ci / codeql workflows. Add the optional docker-dev layer for a reproducible OS envelope."

provides       = ["cargo-workspace", "rust-toolchain"]
requires       = ["git-hooks"]
conflicts-with = ["typescript-package"]
