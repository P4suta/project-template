# lefthook (https://lefthook.dev/) — TypeScript-aware hook policy.
# Supersedes the `lefthook` layer's generic config when the
# `typescript-package` layer is applied.

pre-commit:
  parallel: true
  skip:
    - rebase
    - merge
  commands:
    fmt:
      glob: "*.{ts,mts,js,mjs,json}"
      run: just fmt
      stage_fixed: true
    biome:
      glob: "*.{ts,mts,js,mjs,json}"
      run: just lint-biome
    typos:
      run: just typos
    actionlint:
      glob: ".github/workflows/*.{yml,yaml}"
      run: just actionlint
    yamllint:
      glob: "**/*.{yml,yaml}"
      run: just yamllint
    markdownlint:
      glob: "**/*.md"
      run: just markdownlint

commit-msg:
  commands:
    conventional:
      run: committed --commit-file {1}

pre-push:
  parallel: true
  skip:
    - rebase
  commands:
    test:
      run: just test
    # 依存マニフェストを変更した push のとき、Dependabot のスキャンを待たず
    # ローカルで古さを通知する。非ブロッキング(`|| true`)— push は止めない。
    # gh 未認証だと renovate-local が exit 1 するが、その旨は stderr に出る。
    # 通知だけで十分なら manual 実行(`just renovate-local`)に切り替えてよい。
    deps-freshness:
      glob: "{package.json,package-lock.json,Dockerfile,.github/workflows/*}"
      run: just renovate-local || true
