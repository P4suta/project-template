# Engine self-CI for the project-template repository.
#
# Runs on every push and PR against the template's own main branch:
#   * cargo fmt --check
#   * cargo clippy -- -D warnings
#   * cargo nextest run
#   * cargo llvm-cov (branch coverage gate at 96 %)
#   * tmpl verify (manifest + DAG soundness over the bundled layers)
#   * end-to-end smoke: tmpl apply into a tmpdir, assert no placeholders
#     leak through and the Merkle root is reproducible across runs.

name: Engine + layer CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: tmpl-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (fmt + clippy + typos + actionlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.95.0
          components: rustfmt,clippy

      - name: cargo fmt --check
        run: cargo fmt --manifest-path .template/tmpl/Cargo.toml --all -- --check

      - name: cargo clippy --all-targets -- -D warnings
        run: |
          cargo clippy \
            --manifest-path .template/tmpl/Cargo.toml \
            --all-targets \
            -- -D warnings

      - name: typos
        uses: crate-ci/typos@37bb98842b0d8c4ffebdb75301a13db0267cef89 # master

      - name: actionlint
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8 # v2.1.2

  test:
    name: cargo nextest run
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.95.0
          components: rustfmt,clippy,llvm-tools-preview

      - uses: taiki-e/install-action@0631aa6515c7d545823c67cfae7ef4fc7f490154 # v2.81.8
        with:
          tool: nextest

      - run: cargo nextest run --manifest-path .template/tmpl/Cargo.toml

  coverage:
    # Floor: 94 %. Long-term target: 96 % (afm-tier). Mirror the value
    # bumped in the Justfile.
    name: cargo llvm-cov (regions ≥ 94 %, target 96 %)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.95.0
          components: rustfmt,clippy,llvm-tools-preview

      - uses: taiki-e/install-action@0631aa6515c7d545823c67cfae7ef4fc7f490154 # v2.81.8
        with:
          tool: cargo-llvm-cov

      - name: cargo llvm-cov --fail-under-regions 94
        run: |
          cargo llvm-cov --manifest-path .template/tmpl/Cargo.toml \
            --ignore-filename-regex 'src/main\.rs' \
            --fail-under-regions 94 \
            --summary-only

  verify:
    name: tmpl verify + end-to-end smoke
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.95.0

      - run: cargo build --manifest-path .template/tmpl/Cargo.toml --release

      - name: tmpl verify
        run: .template/tmpl/target/release/tmpl --template-root .template verify

      - name: End-to-end apply smoke
        run: |
          dst="$(mktemp -d)"
          .template/tmpl/target/release/tmpl \
            --template-root .template \
            --dest "$dst" \
            apply \
            --project-name smoke-test \
            --project-owner P4suta \
            --project-description "tmpl-verify smoke run"
          # No placeholder must leak into the rendered output.
          if grep -REn '__[A-Z_]+__' "$dst" \
              --exclude-dir=.template; then
            echo "::error::placeholder leaked into rendered output" >&2
            exit 1
          fi
          # Merkle root must be deterministic across runs.
          dst2="$(mktemp -d)"
          .template/tmpl/target/release/tmpl \
            --template-root .template \
            --dest "$dst2" \
            apply \
            --project-name smoke-test \
            --project-owner P4suta \
            --project-description "tmpl-verify smoke run"
          root1="$(grep '^merkle_root' "$dst/.template/state.toml")"
          root2="$(grep '^merkle_root' "$dst2/.template/state.toml")"
          if [ "$root1" != "$root2" ]; then
            echo "::error::merkle root drifted between runs:" >&2
            echo "  run 1: $root1" >&2
            echo "  run 2: $root2" >&2
            exit 1
          fi

  audit:
    name: cargo deny check
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.95.0

      - uses: taiki-e/install-action@0631aa6515c7d545823c67cfae7ef4fc7f490154 # v2.81.8
        with:
          tool: cargo-deny

      - run: cargo deny --manifest-path .template/tmpl/Cargo.toml check
