# Path A entry point: when a generated repository receives its first
# push, build the `tmpl` engine inside Actions, apply the default layer
# selection, prune everything that isn't a rendered output, and commit
# the result as `chore: initialize from template`. After this commit,
# the templated repo no longer contains any of the template's setup
# machinery (engine, layers, state, this very workflow, etc.).
#
# This workflow is intentionally a no-op on the project-template
# repository itself — the `if:` guard on the job blocks execution
# whenever `${{ github.event.repository.name }}` matches the template
# repo's own name. It is also a structured no-op on a repository that
# has already graduated (no engine present).

name: Template initialization

on:
  push:
    branches: [main, master]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: template-initialization
  cancel-in-progress: true

jobs:
  init:
    name: Apply layers and graduate
    runs-on: ubuntu-latest
    if: >-
      github.event.repository.name != 'project-template' &&
      github.actor != 'github-actions[bot]'
    steps:
      - name: Check out the freshly templated repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Skip if the repository has already graduated
        id: gate
        run: |
          if [ -f .template/tmpl/Cargo.toml ]; then
            echo "graduated=false" >> "$GITHUB_OUTPUT"
          else
            echo "graduated=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Engine not present — repository has already graduated."
          fi

      - name: Install Rust toolchain pinned by .template/tmpl/rust-toolchain.toml
        if: steps.gate.outputs.graduated == 'false'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.95.0
          components: rustfmt,clippy

      - name: Cache the engine's cargo build
        if: steps.gate.outputs.graduated == 'false'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .template/tmpl/target
            ~/.cargo/registry
            ~/.cargo/git
          key: tmpl-engine-${{ hashFiles('.template/tmpl/Cargo.lock', '.template/tmpl/Cargo.toml') }}

      - name: Build tmpl
        if: steps.gate.outputs.graduated == 'false'
        run: cargo build --release --manifest-path .template/tmpl/Cargo.toml

      - name: Apply layers
        if: steps.gate.outputs.graduated == 'false'
        env:
          PROJECT_NAME: ${{ github.event.repository.name }}
          PROJECT_OWNER: ${{ github.event.repository.owner.login }}
          PROJECT_DESCRIPTION: ${{ github.event.repository.description }}
        run: |
          .template/tmpl/target/release/tmpl \
            --template-root .template \
            --dest . \
            apply \
            --project-name "$PROJECT_NAME" \
            --project-owner "$PROJECT_OWNER" \
            --project-description "${PROJECT_DESCRIPTION:-}"

      - name: Prune template residue and remove the engine
        if: steps.gate.outputs.graduated == 'false'
        run: |
          set -euo pipefail

          # Whitelist = files the engine actually rendered.
          .template/tmpl/target/release/tmpl \
            --template-root .template --dest . \
            applied-files | sort -u > /tmp/keep.txt

          if [ ! -s /tmp/keep.txt ]; then
            echo "::error::tmpl applied-files returned an empty whitelist; refusing to prune"
            exit 1
          fi

          # Residue = tracked files NOT rendered by any layer (= template machinery
          # inherited from the Initial commit: `.template/`, this workflow,
          # tmpl-verify.yml, the engine's dev Justfile, etc.).
          git ls-files | sort -u > /tmp/all.txt
          comm -23 /tmp/all.txt /tmp/keep.txt > /tmp/remove.txt

          if [ -s /tmp/remove.txt ]; then
            xargs -a /tmp/remove.txt git rm --quiet
          fi

          # Remove the engine itself + state.toml + cargo target/ (covers
          # untracked artefacts that `git rm` doesn't see).
          rm -rf .template

      - name: Commit and push
        if: steps.gate.outputs.graduated == 'false'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo "::notice::No file changes after apply — nothing to commit."
            exit 0
          fi
          git commit -m 'chore: initialize from template'
          git push
